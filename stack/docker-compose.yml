services:
  postgres:
    image: postgres:18
    container_name: process-automation-example-postgres
    environment:
      POSTGRES_DB: "vacation-approval"
      POSTGRES_USER: "user"
      POSTGRES_PASSWORD: "secret"
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
